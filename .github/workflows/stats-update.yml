on:
  schedule:
    - cron: '0 0 * * 0' # once a week
  push:
    branches:
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Generate README.md
      uses: teoxoy/profile-readme-stats@v2
      with:
        token: ${{ secrets.GHACTION }}
    - name: Install dependencies
      run: pip install "pyalex==0.21" "requests==2.33.1"
    - name: Fetch external stats
      run: python3 .github/scripts/fetch_stats.py
    - name: Update README.md
      run: |
        if [[ "$(git status --porcelain)" != "" ]]; then
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "Update README with stats"
          git push
        fi
